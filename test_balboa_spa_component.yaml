# this configuration file has all empty custom components set up.
# use 'esphome test_empty.yaml compile' to build. 

external_components:
  - source:
      type: local
      path: components

balboa_spa:
  id: test_spa

# Example 1: Using switches for simple ON/OFF control (backwards compatible)
switch:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    jet1:
      name: Jet1
      max_toggle_attempts: 5  # Optional: default is 5
    jet2:
      name: Jet2
    jet3:
      name: Jet3
    jet4:
      name: Jet4
    light:
      name: Lights
    light2:
      name: Second Lights
    blower:
      name: Blower
    highrange:
      name: Temperature Mode
    filter2:
      name: "Filter 2"

light:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    light:
      name: "Lights"
    light2:
      name: "Second Lights"

fan:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    jet_1:
      name: "Jet 1 Fan"
      id: jet1_fan
      max_toggle_attempts: 4
    jet_2:
      name: "Jet 2 Fan"
      id: jet2_fan
    jet_3:
      name: "Jet 3 Fan"
      id: jet3_fan
    jet_4:
      name: "Jet 4 Fan"
      id: jet4_fan
      max_toggle_attempts: 2

climate:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    name: "Spa Thermostat"
    unit_of_measurement: "°F"

water_heater:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    name: "Spa Water Heater"
    unit_of_measurement: "°F"

number:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    target_temp:
      name: "Target Temperature"
      unit_of_measurement: "°F"

sensor:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    current_temp:
      name: "Current Temperature"
      unit_of_measurement: "°F"
    target_temp:
      name: "Target Temperature (Sensor)"
      unit_of_measurement: "°F"
    blower:
      name: Blower
    highrange:
      name: High Range
    circulation:
      name: Circulation
    restmode:
      name: Rest Mode
    heatstate:
      name: Heat State
    spa_temp_scale:
      name: Spa Temp Scale
    time_since_last_status:
      name: Time Since Last Status
    fault_code:
      name: Fault Code
    fault_total_entries:
      name: Fault Total Entries
    fault_current_entry:
      name: Fault Current Entry
    fault_days_ago:
      name: Fault Days Ago

binary_sensor:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    blower:
      name: Blower
    highrange:
      name: High Range
    circulation:
      name: Circulation Pump
    restmode:
      name: Rest Mode
    heatstate:
      name: Heat State
    connected:
      name: Connected
    filter1_window_active:
      name: Filter 1 Window Active
    filter2_window_active:
      name: Filter 2 Window Active
    cleanup_cycle:
      name: Cleanup Cycle

text_sensor:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    spa_time:
      name: "Spa Time"
    filter1_config:
      name: "Filter 1 Config"
    filter2_config:
      name: "Filter 2 Config"
    fault_message:
      name: "Fault Message"
    fault_log_time:
      name: "Fault Log Time"
    reminder:
      name: "Reminder"
    component_version:
      name: "Component Version"

button:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    sync_time:
      name: "Sync Spa Time"
    disable_filter2:
      name: "Disable Filter 2"
    request_fault_log:
      name: "Request Fault Log"
    clear_reminder:
      name: "Clear Reminder"

text:
  - platform: balboa_spa
    balboa_spa_id: test_spa
    spa_time:
      name: "Set Spa Time"
      mode: TEXT
    filter1_start_time:
      name: "Set Filter 1 Start Time"
      mode: TEXT
    filter1_duration:
      name: "Set Filter 1 Duration"
      mode: TEXT
    filter2_start_time:
      name: "Set Filter 2 Start Time"  
      mode: TEXT
    filter2_duration:
      name: "Set Filter 2 Duration"
      mode: TEXT
